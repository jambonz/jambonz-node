          name: days
          required: false
          schema:
            type: integer
            description: number of days back to retrieve,
            minimum: 1
            maximum: 30
        - in: query
          name: start
          required: false
          schema:
            type: string
            format: date-time
            description: start date to retrieve
        - in: query
          name: end
