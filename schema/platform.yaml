openapi: 3.0.0
info:
  title: Jambonz API
  description: Jambonz REST API specification
  contact:
    email: daveh@drachtio.org
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: 1.0.0
servers:
  - url: https://api.jambonz.cloud/v1
security:
  - bearerAuth: []
tags:
  - name: Users
    description: User Management
  - name: Settings
    description: General Settings
  - name: Accounts
    description: Account Settings
  - name: Clients
    description: SIP Clients
  - name: Applications
    description: Applications
  - name: Recent Calls
    description: Details of calls
  - name: Alerts
    description: Alerts of Errors and failures
  - name: Carriers
    description: SIP Carriers & Trunks
  - name: Speech
    description: Text to Speech & Speech to Text Providers
  - name: Phone Numbers
    description: Routing of Phone numbers to Applications
  - name: Call Routing
    description: Least cost Call Routing
paths:
  /Sbcs:
    get:
      tags:
        - Carriers
      summary: retrieve public IP addresses of the jambonz SBCs
      operationId: listSbcs
      parameters:
        - in: query
          name: service_provider_sid
          required: false
          schema:
            type: string
            description: return only the SBCs operated for the sole use of this service provider
      responses:
        "200":
          description: list of SBC addresses
          content:
            application/json:
              schema:
                type: array
                items:
                  properties:
                    ipv4:
                      type: string
                      description: ip address of one of our Sbcs
                  required:
                    - ipv4
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
  /ApiKeys/{ApiKeySid}:
    parameters:
      - name: ApiKeySid
        in: path
        required: true
        schema:
          type: string
  /Users:
    post:
      tags:
        - Users
      summary: create a new user
      operationId: createUser
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - is_active
                - force_change
                - is_view_only
                - initial_password
                - email
              properties:
                name:
                  type: string
                  description: username
                  example: my_user
                email:
                  type: string
                  description: user email address
                  example: user@example.com
                is_active:
                  type: boolean
                  description: user account is active
                force_change:
                  type: boolean
                  description: require the user to change password on next login
                initial_password:
                  type: string
                  description: users password
                  example: MySecurePassword
                account_sid:
                  type: string
                  format: uuid
                  description: account sid the account the user will have access to, if not set will create a Service Provider account
                service_provider_sid:
                  type: string
                  format: uuid
                  description: The service provider sid, the account is under, if not set account will be admin level
                is_view_only:
                  type: boolean
                  description: if set to true the user will not be able to make changes
      responses:
        "200":
          description: user created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_sid:
                    type: string
                    format: uuid
                    description: The sid of the newly created user
                    example: "58b8ec3a-6fcc-4fd7-8f45-cff054c2ebe9"
        "403":
          description: user creation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
  /Users/{UserSid}:
    parameters:
      - name: UserSid
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
    get:
      tags:
        - Users
      summary: retrieve user information
      operationId: getUser
      responses:
        "200":
          description: user information
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_sid:
                    type: string
                    format: uuid
                    example: "58b8ec3a-6fcc-4fd7-8f45-cff054c2ebe9"
                  name:
                    type: string
                    description: username
                    example: my_user
                  email:
                    type: string
                    description: user email address
                    example: user@example.com
                  is_active:
                    type: number
                    description: user account is active
                    enum:
                      - 0
                      - 1
                  force_change:
                    type: number
                    description: require the user to change password on next login
                    enum:
                      - 0
                      - 1
                  account_sid:
                    type: string
                    format: uuid
                    description: account sid the account the user will have access to, if not set will create a Service Provider account
                  service_provider_sid:
                    type: string
                    format: uuid
                    description: The service provider sid, the account is under, if not set account will be admin level
                  is_view_only:
                    type: boolean
                    description: If set to true the user will not be able to make changes
                  provider:
                    type: string
                    enum:
                      - local
                  provider_user_id:
                    type: string
                  scope:
                    type: string
                    enum:
                      - read-write
                  phone_activation_code:
                    type: string
                  email_activation_code:
                    type: string
                  email_validated:
                    type: number
                    enum:
                      - 0
                      - 1
                  phone_validated:
                    type: number
                    enum:
                      - 0
                      - 1
                  email_content_opt_out:
                    type: number
                    enum:
                      - 0
                      - 1
                  pending_email:
                    type: string
                  phone:
                    type: string
        "403":
          description: user information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
    put:
      tags:
        - Users
      summary: update user information
      operationId: updateUser
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                email_activation_code:
                  type: string
                old_password:
                  type: string
                  description: existing password, which is to be replaced
                new_password:
                  type: string
                  description: new password
                is_active:
                  type: boolean
                force_change:
                  type: boolean
                is_view_only:
                  type: boolean
                  description: if set to true the user will not be able to make changes
      responses:
        "204":
          description: user updated
        "403":
          description: user update failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
    delete:
      tags:
        - Users
      summary: delete a user
      operationId: deleteUser
      responses:
        "204":
          description: user deleted
        "403":
          description: unauthorized
        "404":
          description: user not found
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
  /Availability:
    get:
      tags:
        - Accounts
      summary: check if a limited-availability entity such as a subdomain, email or phone number is already in use
      operationId: checkAvailability
      parameters:
        - in: query
          name: type
          required: true
          schema:
            type: string
            enum:
              - email
              - phone
              - subdomain
            example: subdomain
        - in: query
          name: value
          required: true
          schema:
            type: string
            example: mycorp.sip.jambonz.cloud
      responses:
        "200":
          description: indicates whether value is already in use
          content:
            application/json:
              schema:
                type: object
                properties:
                  available:
                    type: boolean
                    description: true if value requested is available
                required:
                  - available
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
  /Webhooks/{WebhookSid}:
    parameters:
      - name: WebhookSid
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
    get:
      tags:
        - Applications
      summary: retrieve webhook
      operationId: getWebhook
      responses:
        "200":
          description: webhook found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "404":
          description: webhook not found
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
  /VoipCarriers/{VoipCarrierSid}:
    parameters:
      - name: VoipCarrierSid
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
    delete:
      tags:
        - Carriers
      summary: delete a voip carrier
      operationId: deleteVoipCarrier
      responses:
        "204":
          description: voip carrier successfully deleted
        "404":
          description: voip carrier not found
        "422":
          description: unprocessable entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
                example:
                  msg: a service provider with active accounts can not be deleted
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
    get:
      tags:
        - Carriers
      summary: retrieve voip carrier
      operationId: getVoipCarrier
      responses:
        "200":
          description: voip carrier found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoipCarrier"
        "404":
          description: voip carrier not found
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
    put:
      tags:
        - Carriers
      summary: update voip carrier
      operationId: updateVoipCarrier
      parameters:
        - name: VoipCarrierSid
          in: path
          required: true
          style: simple
          explode: false
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoipCarrier"
      responses:
        "204":
          description: voip carrier updated
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
        "404":
          description: voip carrier not found
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
  /SipGateways:
    post:
      tags:
        - Carriers
      summary: create sip gateway
      operationId: createSipGateway
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                voip_carrier_sid:
                  type: string
                  description: voip carrier that provides this gateway
                  format: uuid
                ipv4:
                  type: string
                netmask:
                  type: integer
                port:
                  type: integer
                is_active:
                  type: boolean
                inbound:
                  type: boolean
                outbound:
                  type: boolean
              required:
                - voip_carrier_sid
                - ipv4
      responses:
        "201":
          description: sip gateway successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessfulAdd"
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
        "422":
          description: unprocessable entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
    get:
      tags:
        - Carriers
      summary: list sip gateways
      operationId: listSipGateways
      parameters:
        - in: query
          name: voip_carrier_sid
          required: true
          schema:
            type: string
            description: return only the SipGateways operated for this VoipCarrier
      responses:
        "200":
          description: list of sip gateways
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SipGateway"
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
  /SipGateways/{SipGatewaySid}:
    parameters:
      - name: SipGatewaySid
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
    delete:
      tags:
        - Carriers
      summary: delete a sip gateway
      operationId: deleteSipGateway
      responses:
        "204":
          description: sip gateway successfully deleted
        "404":
          description: sip gateway not found
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
    get:
      tags:
        - Carriers
      summary: retrieve sip gateway
      operationId: getSipGateway
      responses:
        "200":
          description: sip gateway found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SipGateway"
        "404":
          description: sip gateway not found
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
    put:
      tags:
        - Carriers
      summary: update sip gateway
      operationId: updateSipGateway
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SipGateway"
      responses:
        "204":
          description: sip gateway updated
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
        "404":
          description: sip gateway not found
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
  /SmppGateways/{SmppGatewaySid}:
    parameters:
      - name: SmppGatewaySid
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
  /PhoneNumbers:
    post:
      tags:
        - Phone Numbers
      summary: provision a phone number into inventory from a Voip Carrier
      operationId: provisionPhoneNumber
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                account_sid:
                  type: string
                  format: uuid
                application_sid:
                  type: string
                  format: uuid
                number:
                  type: string
                  description: telephone number
                voip_carrier_sid:
                  type: string
                  format: uuid
              required:
                - number
                - voip_carrier_sid
      responses:
        "201":
          description: phone number successfully provisioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessfulAdd"
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
              example:
                msg: invalid telephone number format
        "404":
          description: voip carrier not found
        "422":
          description: unprocessable entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
                example:
                  msg: the phone number provided already exists in inventory
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
    get:
      tags:
        - Phone Numbers
      summary: list phone numbers
      operationId: listProvisionedPhoneNumbers
      responses:
        "200":
          description: list of phone numbers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PhoneNumber"
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
  /PhoneNumbers/{PhoneNumberSid}:
    parameters:
      - name: PhoneNumberSid
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
    delete:
      tags:
        - Phone Numbers
      summary: delete a phone number
      operationId: deletePhoneNumber
      responses:
        "204":
          description: phone number successfully deleted
        "404":
          description: phone number not found
        "422":
          description: unprocessable entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
                example:
                  msg: phone number that is assigned to an account may not be deleted
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
    get:
      tags:
        - Phone Numbers
      summary: retrieve phone number
      operationId: getPhoneNumber
      responses:
        "200":
          description: phone number found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhoneNumber"
        "404":
          description: phone number not found
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
    put:
      tags:
        - Phone Numbers
      summary: update phone number
      operationId: updatePhoneNumber
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhoneNumber"
      responses:
        "204":
          description: phone number updated
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
        "404":
          description: phone number not found
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
  /Accounts:
    post:
      tags:
        - Accounts
      summary: create an account
      operationId: createAccount
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: account name
                  example: foobar
                sip_realm:
                  type: string
                  description: sip realm for registration
                  example: sip.mycompany.com
                registration_hook:
                  $ref: "#/components/schemas/Webhook"
                  description: authentication webhook for registration
                queue_event_hook:
                  $ref: "#/components/schemas/Webhook"
                  description: webhook called when members join or leave a queue
                service_provider_sid:
                  type: string
                  format: uuid
                  example: 85f9c036-ba61-4f28-b2f5-617c23fa68ff
              required:
                - name
                - service_provider_sid
      responses:
        "201":
          description: account successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessfulAdd"
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
        "422":
          description: unprocessable entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
    get:
      tags:
        - Accounts
      summary: list accounts
      operationId: listAccounts
      responses:
        "200":
          description: list of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
  /Accounts/{AccountSid}:
    parameters:
      - name: AccountSid
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags:
        - Accounts
      summary: delete an account
      operationId: deleteAccount
      responses:
        "204":
          description: account successfully deleted
        "404":
          description: account not found
        "422":
          description: unprocessable entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
    get:
      tags:
        - Accounts
      summary: retrieve account
      operationId: getAccount
      responses:
        "200":
          description: account found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: account not found
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
    put:
      tags:
        - Accounts
      summary: update account
      operationId: updateAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Account"
      responses:
        "204":
          description: account updated
        "404":
          description: account not found
        "422":
          description: unprocessable entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
  /Accounts/{AccountSid}/WebhookSecret:
    parameters:
      - name: AccountSid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: regenerate
        in: query
        required: false
        schema:
          type: boolean
    get:
      tags:
        - Accounts
      summary: get webhook signing secret, regenerating if requested
      operationId: getWebhookSecret
      responses:
        "200":
          description: secret
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook_secret:
                    type: string
        "404":
          description: account not found
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
  /Accounts/{AccountSid}/SipRealms/{SipRealm}:
    parameters:
      - name: AccountSid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: SipRealm
        in: path
        required: true
        schema:
          type: string
    post:
      tags:
        - Accounts
      summary: add or change the sip realm
      operationId: createSipRealm
      responses:
        "204":
          description: sip_realm updated and DNS entries successfully created
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
  /Accounts/{AccountSid}/SpeechCredentials:
    parameters:
      - name: AccountSid
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags:
        - Speech
      summary: add a speech credential
      operationId: createSpeechCredential
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpeechCredential"
      responses:
        "201":
          description: speech credential successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessfulAdd"
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
        "500":
          description: system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralError"
    get:
      tags:
        - Speech
      summary: retrieve all speech credentials for an account
      operationId: listSpeechCredentials
      responses:
        "200":
          description: retrieve speech credentials for a specified account
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpeechCredential"
        "404":
          description: account not found
  /Accounts/{AccountSid}/SpeechCredentials/{SpeechCredentialSid}:
    parameters:
      - name: AccountSid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: SpeechCredentialSid
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags:
        - Speech
      summary: get a specific speech credential
      operationId: getSpeechCredentialByAccount
      responses:
        "200":
          description: retrieve speech credentials for a specified account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeechCredential"
        "404":
          description: credential not found
    put:
