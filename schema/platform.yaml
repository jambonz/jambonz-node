      responses:
        "200":
          description: retrieve recent call records for a specified account
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: total number of records in that database that match the filter criteria
                  batch:
                    type: integer
                    description: total number of records returned in this page set
                  page:
                    type: integer
                    description: page number that was requested, and is being returned
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        service_provider_sid:
                          type: string
                          format: uuid
                        account_sid:
                          type: string
                          format: uuid
                        call_sid:
                          type: string
                          format: uuid
                        from:
                          type: string
                        to:
                          type: string
                        answered:
                          type: boolean
                        sip_call_id:
                          type: string
                        sip_status:
                          type: integer
                        duration:
                          type: integer
                        attempted_at:
                          type: integer
                        answered_at:
                          type: integer
                        terminated_at:
                          type: integer
                        termination_reason:
                          type: string
                        host:
                          type: string
                        remote_host:
                          type: string
                        direction:
                          type: string
                          enum:
                            - inbound
                            - outbound
                        trunk:
                          type: string
                      required:
                        - account_sid
                        - call_sid
                        - attempted_at
                        - terminated_at
                        - answered
                        - direction
                        - from
                        - to
                        - sip_status
                        - duration
        "404":
          description: account not found
