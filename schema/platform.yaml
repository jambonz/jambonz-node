          format: uuid
      - in: query
        name: page
        required: true
        schema:
          type: integer
          description: page number of data to retrieve
      - in: query
        name: count
        required: true
        schema:
          type: integer
          description: number of rows to retrieve in each page set
      - in: query
        name: days
        required: false
        schema:
          type: integer
          description: number of days back to retrieve, must be ge 1 and le 30
      - in: query
        name: start
        required: false
        schema:
          type: string
          format: date-time
          description: start date to retrieve
      - in: query
        name: end
        required: false
        schema:
          type: string
          format: date-time
          description: end date to retrieve
      - in: query
        name: answered
        required: false
        schema:
          type: string
          enum:
            - "true"
            - "false"
